<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>审计日志 · 管理操作记录</title>
  <link rel="stylesheet" href="./theme.css" />
  <link rel="stylesheet" href="./knowledge.css" />
</head>
<body class="module knowledge-page log-page">
  <header class="kb-bar">
    <a class="module-back" href="/">返回指挥台</a>
    <div class="module-title">
      <strong>审计日志</strong>
      <span>网页管理操作记录</span>
    </div>
    <button class="btn" id="refreshBtn" type="button">刷新</button>
  </header>

  <main class="log-shell">
    <section class="kb-panel log-toolbar-panel">
      <form id="filterForm" class="log-filter">
        <input name="q" placeholder="搜索操作 / 用户 / api_key / finance" />
        <select name="limit">
          <option value="60">60 条</option>
          <option value="120" selected>120 条</option>
          <option value="200">200 条</option>
        </select>
        <button class="btn btn-solid" type="submit">查询</button>
        <span class="log-count" id="auditCount">0 条</span>
      </form>
    </section>

    <section class="kb-panel log-list-panel">
      <div class="panel-head">
        <h2>操作记录</h2>
        <span>不含企微聊天原文</span>
      </div>
      <div id="auditList" class="timeline-list compact">
        <div class="empty-state">正在加载…</div>
      </div>
    </section>
  </main>

  <div id="toast" class="toast"></div>
  <script src="./audit.js"></script>
</body>
</html>
