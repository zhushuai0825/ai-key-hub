<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Command Hub · AI 运维指挥台</title>
  <link rel="stylesheet" href="./theme.css" />
  <link rel="stylesheet" href="./styles.css" />
</head>
<body class="cockpit">
  <div class="cockpit-shell">
    <div class="cockpit-grid-bg" aria-hidden="true"></div>

    <header class="cockpit-bar">
      <div class="cockpit-brand">
        <span class="brand-mark" aria-hidden="true"></span>
        <div>
          <strong>Command Hub</strong>
          <span>AI 运维指挥台</span>
        </div>
      </div>
      <time id="clock" class="cockpit-clock">--</time>
    </header>

    <section class="telemetry-strip" aria-label="系统遥测">
      <div class="telemetry" id="telemetry"></div>
    </section>

    <main class="cockpit-body">
      <div class="cockpit-main">
        <section class="memory-dashboard" aria-label="助手数据大屏">
          <article class="dash-panel dash-panel-cache">
            <header class="dash-head">
              <h2>缓存命中</h2>
              <span class="dash-meta" id="cacheHitMeta">0 次命中</span>
            </header>
            <div id="cacheHitFeed" class="dash-feed"></div>
            <a class="dash-link" href="/assistant-cache.html">查看全部</a>
          </article>

          <article class="dash-panel dash-panel-tasks">
            <header class="dash-head">
              <h2>今日待办</h2>
              <span class="dash-meta" id="tasksMeta">0 项</span>
            </header>
            <div id="tasksFeed" class="dash-feed"></div>
          </article>

          <article class="dash-panel dash-panel-lifestyle">
            <header class="dash-head">
              <h2>健康生活</h2>
              <span class="dash-meta">体重 · 饮食 · 睡眠</span>
            </header>
            <div id="lifestyleFeed" class="dash-feed"></div>
            <a class="dash-link" href="/fitness.html">FitLog</a>
          </article>

          <article class="dash-panel dash-panel-finance">
            <header class="dash-head">
              <h2>记账</h2>
              <span class="dash-meta" id="financeMonthMeta">本月 --</span>
            </header>
            <div id="financeFeed" class="dash-feed"></div>
            <a class="dash-link" href="/assistant-cache.html">查看全部</a>
          </article>
        </section>

        <section class="module-grid" id="moduleGrid" aria-label="功能模块"></section>
      </div>

      <aside class="cockpit-rail">
        <section class="rail-card">
          <header class="rail-head">
            <h2>调用 Pulse</h2>
            <span class="rail-meta">近 24h · 万次</span>
          </header>
          <div id="pulseChart" class="pulse-chart"></div>
        </section>

        <section class="rail-card">
          <header class="rail-head">
            <h2>信号</h2>
            <span class="signal-count" id="alertCount">0</span>
          </header>
          <div id="signalFeed" class="signal-feed"></div>
        </section>

        <section class="rail-card">
          <header class="rail-head">
            <h2>健康趋势</h2>
            <span class="rail-meta">最近 30 天</span>
          </header>
          <div id="fitnessChart" class="pulse-chart"></div>
        </section>

        <section class="rail-card rail-compact">
          <header class="rail-head"><h2>拓扑</h2></header>
          <div class="topology" id="topology" aria-hidden="true">
            <svg viewBox="0 0 280 120" fill="none">
              <circle class="topo-node core" cx="140" cy="60" r="18"/>
              <circle class="topo-node" cx="50" cy="30" r="10"/>
              <circle class="topo-node" cx="230" cy="30" r="10"/>
              <circle class="topo-node" cx="50" cy="90" r="10"/>
              <circle class="topo-node" cx="230" cy="90" r="10"/>
              <circle class="topo-node live" cx="140" cy="18" r="8"/>
              <line class="topo-line" x1="140" y1="42" x2="50" y2="30"/>
              <line class="topo-line" x1="140" y1="42" x2="230" y2="30"/>
              <line class="topo-line" x1="140" y1="78" x2="50" y2="90"/>
              <line class="topo-line" x1="140" y1="78" x2="230" y2="90"/>
              <line class="topo-line live" x1="140" y1="42" x2="140" y2="26"/>
            </svg>
            <div class="topo-labels">
              <span class="live">AIToken</span>
              <span>Gateway</span>
              <span>Agent</span>
              <span>Knowledge</span>
              <span>Tasks</span>
            </div>
          </div>
        </section>
      </aside>
    </main>

    <footer class="cockpit-foot">
      <span class="sys-ok"><i></i>SYS ONLINE</span>
      <span id="nodeStatus">8 modules · 1 online</span>
      <span class="foot-meta">v0.2 · internal</span>
    </footer>
  </div>

  <script src="./node_modules/echarts/dist/echarts.min.js"></script>
  <script src="./app.js"></script>
</body>
</html>
