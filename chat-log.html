<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>对话日志 · 企微消息记录</title>
  <link rel="stylesheet" href="./theme.css" />
  <link rel="stylesheet" href="./knowledge.css" />
</head>
<body class="module knowledge-page">
  <header class="kb-bar">
    <a class="module-back" href="/">返回指挥台</a>
    <div class="module-title">
      <strong>对话日志</strong>
      <span>企业微信发过的消息与系统回复，按时间倒序</span>
    </div>
    <div class="kb-bar-actions">
      <a class="btn" href="/wechat-inbox.html">去处理台</a>
      <button class="btn" id="refreshBtn" type="button">刷新</button>
    </div>
  </header>

  <main class="config-shell">
    <section class="kb-panel">
      <div class="panel-head">
        <h2>筛选</h2>
        <span id="chatCount">0 条</span>
      </div>
      <p class="timeline-hint" style="padding-top:14px">
        这里放「你好」「买咖啡 18」这类<strong>对话原文</strong>。
        管理操作看「审计日志」，自动备份/重试看「系统日志」。
      </p>
      <form id="filterForm" class="doc-form">
        <div class="form-grid">
          <label>关键词
            <input name="q" placeholder="搜索消息内容、回复、用户" />
          </label>
          <label>类型
            <select name="intent">
              <option value="">全部意图</option>
              <option value="chat">聊天</option>
              <option value="finance">记账</option>
              <option value="fitness">健康</option>
              <option value="knowledge">知识库</option>
              <option value="task">提醒</option>
              <option value="memory">记忆</option>
              <option value="report">报告</option>
            </select>
          </label>
          <label>状态
            <select name="status">
              <option value="">全部状态</option>
              <option value="replied">已回复</option>
              <option value="recorded">已记录</option>
              <option value="failed">失败</option>
              <option value="processing">处理中</option>
              <option value="ignored">已忽略</option>
            </select>
          </label>
          <label>数量
            <input name="limit" type="number" min="20" max="200" value="80" />
          </label>
        </div>
        <button class="btn btn-solid" type="submit">查询</button>
      </form>
      <div id="summaryGrid" class="monitor-grid" style="padding-top:0"></div>
    </section>

    <section class="kb-panel">
      <div class="panel-head">
        <h2>对话记录</h2>
        <span>含原文与回复</span>
      </div>
      <div id="chatList" class="timeline-list compact">
        <div class="empty-state">正在加载…</div>
      </div>
    </section>
  </main>

  <div id="toast" class="toast"></div>
  <script src="./chat-log.js"></script>
</body>
</html>
