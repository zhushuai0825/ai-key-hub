<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>对话日志 · 企微消息记录</title>
  <link rel="stylesheet" href="./theme.css" />
  <link rel="stylesheet" href="./knowledge.css" />
</head>
<body class="module knowledge-page log-page">
  <header class="kb-bar">
    <a class="module-back" href="/">返回指挥台</a>
    <div class="module-title">
      <strong>对话日志</strong>
      <span>企微消息原文与系统回复</span>
    </div>
    <div class="kb-bar-actions">
      <a class="btn" href="/wechat-inbox.html">去处理台</a>
      <button class="btn" id="refreshBtn" type="button">刷新</button>
    </div>
  </header>

  <main class="log-shell">
    <section class="kb-panel log-toolbar-panel">
      <form id="filterForm" class="log-filter">
        <input name="q" placeholder="搜索内容 / 回复 / 用户" />
        <select name="intent">
          <option value="">全部意图</option>
          <option value="chat">聊天</option>
          <option value="finance">记账</option>
          <option value="fitness">健康</option>
          <option value="knowledge">知识库</option>
          <option value="task">提醒</option>
          <option value="memory">记忆</option>
          <option value="report">报告</option>
        </select>
        <select name="status">
          <option value="">全部状态</option>
          <option value="replied">已回复</option>
          <option value="recorded">已记录</option>
          <option value="failed">失败</option>
          <option value="processing">处理中</option>
          <option value="ignored">已忽略</option>
        </select>
        <select name="limit">
          <option value="40">40 条</option>
          <option value="80" selected>80 条</option>
          <option value="160">160 条</option>
        </select>
        <button class="btn btn-solid" type="submit">查询</button>
        <div id="summaryGrid" class="log-stats"></div>
        <span class="log-count" id="chatCount">0 条</span>
      </form>
    </section>

    <section class="kb-panel log-list-panel">
      <div class="panel-head">
        <h2>对话记录</h2>
        <span>按时间倒序</span>
      </div>
      <div id="chatList" class="timeline-list compact">
        <div class="empty-state">正在加载…</div>
      </div>
    </section>
  </main>

  <div id="toast" class="toast"></div>
  <script src="./chat-log.js"></script>
</body>
</html>
