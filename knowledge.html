<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Knowledge Library · 知识库管理</title>
  <link rel="stylesheet" href="./theme.css" />
  <link rel="stylesheet" href="./knowledge.css" />
</head>
<body class="module knowledge-page manage-page">
  <header class="kb-bar">
    <a class="module-back" href="/">返回指挥台</a>
    <div class="module-title"><strong>Knowledge Library</strong><span>知识库创建 · 文档上传 · 向量入库</span></div>
    <a class="btn" href="/knowledge-ask.html">去提问</a>
  </header>

  <main class="kb-manage-shell">
    <section class="kb-panel bases-panel">
      <div class="panel-head"><h2>知识库</h2><span id="kbSummary">--</span></div>
      <form id="baseForm" class="base-form">
        <input name="name" required placeholder="知识库名称，例如 健身资料" />
        <select name="category" id="categorySelect"></select>
        <input name="description" placeholder="描述" />
        <button class="btn btn-solid" type="submit">新建知识库</button>
      </form>
      <div class="category-manager">
        <div class="sub-head"><strong>分类管理</strong><span>可新增、重命名、删除</span></div>
        <form id="categoryForm" class="category-form">
          <input name="name" placeholder="新增分类，例如 工作资料" />
          <button class="btn" type="submit">添加</button>
        </form>
        <div id="categoryList" class="category-list"></div>
      </div>
      <div id="baseList" class="base-list"></div>
    </section>

    <section class="kb-panel docs-panel">
      <div class="panel-head"><h2>文档入库</h2><span id="activeKbName">请选择知识库</span></div>
      <div class="doc-grid">
        <form id="textForm" class="doc-form">
          <h3>粘贴文本</h3>
          <input name="title" placeholder="标题" />
          <textarea name="text" placeholder="粘贴文本或 Markdown 内容"></textarea>
          <button class="btn btn-solid" type="submit">保存并切分</button>
        </form>
        <form id="uploadForm" class="doc-form">
          <h3>上传文件</h3>
          <input name="title" placeholder="标题，可选" />
          <input name="file" type="file" accept=".txt,.md,.pdf,.docx,.json,.csv" />
          <p class="form-hint">支持 TXT / MD / PDF / DOCX / JSON / CSV，上传后自动解析、切分并写入 ChromaDB。</p>
          <button class="btn btn-solid" type="submit">上传并入库</button>
        </form>
      </div>
      <div id="docList" class="doc-list"></div>
    </section>
  </main>

  <div id="toast" class="toast"></div>
  <script src="./knowledge.js"></script>
</body>
</html>
