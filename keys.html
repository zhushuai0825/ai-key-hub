<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>AIToken · Key 管理</title>
  <link rel="stylesheet" href="./theme.css" />
  <link rel="stylesheet" href="./key.css" />
</head>
<body class="module">
  <div class="module-shell">
    <header class="module-bar">
      <a class="module-back" href="/">
        <img src="./assets/icons/aitoken.svg" alt="" width="18" height="18" />
        <span>返回指挥台</span>
      </a>
      <div class="module-title">
        <strong>AIToken</strong>
        <span>API Key · 余额 · 模型目录</span>
      </div>
      <div class="module-actions">
        <time id="clock" class="cockpit-clock">--</time>
        <button class="btn" id="refreshBtn" type="button">刷新</button>
      </div>
    </header>

    <div class="module-body">
      <section id="stats" class="stats-row"></section>

      <div class="toolbar">
        <input id="searchInput" type="text" placeholder="搜索名称或厂商" />
        <select id="providerFilter"><option value="">全部厂商</option></select>
        <select id="statusFilter">
          <option value="">全部状态</option>
          <option value="active">启用</option>
          <option value="warning">关注</option>
          <option value="disabled">停用</option>
        </select>
      </div>

      <section class="keys-layout">
        <div id="keys" class="key-table-wrap"></div>

        <aside class="keys-aside">
          <section class="panel">
            <div class="panel-head"><h2>厂商</h2></div>
            <div id="providerCards" class="provider-list"></div>
          </section>
          <section class="panel">
            <div class="panel-head"><h2>提醒</h2></div>
            <div id="alerts" class="feed"></div>
          </section>
        </aside>
      </section>
    </div>
  </div>

  <div id="budgetModal" class="modal" aria-hidden="true">
    <div class="modal-panel" role="dialog" aria-modal="true" aria-labelledby="budgetTitle">
      <div class="modal-head">
        <div>
          <h2 id="budgetTitle">设置预算</h2>
          <p id="budgetKeyName">--</p>
        </div>
        <button id="budgetClose" class="modal-close" type="button">×</button>
      </div>
      <form id="budgetForm" class="budget-form">
        <input type="hidden" name="id" />
        <label>日预算<input name="daily_quota" type="number" min="0" step="0.01" placeholder="0 表示不限制" /></label>
        <label>月预算<input name="monthly_quota" type="number" min="0" step="0.01" placeholder="0 表示不限制" /></label>
        <label>已用金额<input name="used_amount" type="number" min="0" step="0.01" placeholder="真实调用统计接入前可手动维护" /></label>
        <label>超预算动作
          <select name="budget_action">
            <option value="alert">仅提醒</option>
            <option value="disable_copy">禁用复制</option>
            <option value="disable_key">标记停用</option>
          </select>
        </label>
        <label class="wide">备注<input name="remark" placeholder="预算用途、项目归属、负责人" /></label>
        <div class="modal-actions">
          <button class="btn" type="button" id="budgetCancel">取消</button>
          <button class="btn primary" type="submit">保存预算</button>
        </div>
      </form>
    </div>
  </div>

  <div id="toast" class="toast"></div>
  <script src="./key.js"></script>
</body>
</html>
