<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>AIToken · Key 管理</title>
  <link rel="stylesheet" href="./theme.css" />
  <link rel="stylesheet" href="./key.css" />
</head>
<body class="module">
  <div class="module-shell">
    <header class="module-bar">
      <a class="module-back" href="/">
        <img src="./assets/icons/aitoken.svg" alt="" width="18" height="18" />
        <span>返回指挥台</span>
      </a>
      <div class="module-title">
        <strong>AIToken</strong>
        <span>API Key · 余额 · 模型目录</span>
      </div>
      <div class="module-actions">
        <time id="clock" class="cockpit-clock">--</time>
        <button class="btn" id="refreshBtn" type="button">刷新</button>
      </div>
    </header>

    <div class="module-body">
      <section id="stats" class="stats-row"></section>

      <div class="toolbar">
        <input id="searchInput" type="text" placeholder="搜索名称或厂商" />
        <select id="providerFilter"><option value="">全部厂商</option></select>
        <select id="statusFilter">
          <option value="">全部状态</option>
          <option value="active">启用</option>
          <option value="warning">关注</option>
          <option value="disabled">停用</option>
        </select>
      </div>

      <section class="keys-layout">
        <div id="keys" class="key-table-wrap"></div>

        <aside class="keys-aside">
          <section class="panel">
            <div class="panel-head"><h2>厂商</h2></div>
            <div id="providerCards" class="provider-list"></div>
          </section>
          <section class="panel">
            <div class="panel-head"><h2>提醒</h2></div>
            <div id="alerts" class="feed"></div>
          </section>
        </aside>
      </section>
    </div>
  </div>

  <div id="toast" class="toast"></div>
  <script src="./key.js"></script>
</body>
</html>
