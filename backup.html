<!doctype html><html lang="zh-CN"><head><meta charset="utf-8"/><meta name="viewport" content="width=device-width, initial-scale=1"/><title>Backup · 备份恢复</title><link rel="stylesheet" href="./theme.css"/><link rel="stylesheet" href="./knowledge.css"/></head><body class="module knowledge-page"><header class="kb-bar"><a class="module-back" href="/">返回指挥台</a><div class="module-title"><strong>Backup</strong><span>数据导出 · 自动备份 · 恢复</span></div><div class="row-actions"><button class="btn" id="createBackupBtn">创建本地备份</button><button class="btn" id="exportBtn">导出 JSON</button></div></header><main class="config-shell"><section class="kb-panel"><div class="panel-head"><h2>本地备份</h2><span id="backupFileCount">--</span></div><div id="backupFiles" class="history-list"><div class="empty-state">正在加载备份文件...</div></div></section><section class="kb-panel"><div class="panel-head"><h2>备份导出</h2><span>安全快照</span></div><div class="doc-form"><p class="form-hint">导出包含业务表数据。自动备份保存在服务器本地 backups 目录，不提交到 Git。</p><textarea id="backupPreview" readonly placeholder="点击导出 JSON 后显示摘要"></textarea></div></section><section class="kb-panel"><div class="panel-head"><h2>恢复导入</h2><span>先预览后执行</span></div><div class="doc-form"><input id="backupFile" type="file" accept="application/json,.json"/><div class="row-actions"><button class="btn" id="previewImportBtn" type="button">预览恢复</button><button class="btn" id="importSkipBtn" type="button">导入新数据</button><button class="btn danger-btn" id="importReplaceBtn" type="button">覆盖同 ID</button></div><p class="form-hint">导入新数据会跳过已有 ID；覆盖同 ID 会更新相同 ID 的字段，不会清空整库。</p><textarea id="importPreview" readonly placeholder="选择备份文件后先预览"></textarea></div></section></main><div id="toast" class="toast"></div><script src="./backup.js"></script></body></html>
