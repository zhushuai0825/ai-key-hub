<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>备份恢复</title>
  <link rel="stylesheet" href="./theme.css" />
  <link rel="stylesheet" href="./knowledge.css" />
</head>
<body class="module knowledge-page compact-backup">
  <header class="kb-bar">
    <a class="module-back" href="/">返回指挥台</a>
    <div class="module-title"><strong>备份恢复</strong><span>导出 · 自动备份 · 恢复</span></div>
    <div class="kb-bar-actions">
      <button class="btn" id="createBackupBtn" type="button">创建备份</button>
      <button class="btn btn-solid" id="exportBtn" type="button">导出 JSON</button>
    </div>
  </header>
  <main class="config-shell backup-shell">
    <section class="kb-panel">
      <div class="panel-head"><h2>本地备份</h2><span id="backupFileCount">--</span></div>
      <div id="backupFiles" class="log-stream"></div>
    </section>
    <section class="kb-panel">
      <div class="panel-head"><h2>导出摘要</h2><span>安全快照</span></div>
      <div class="compact-form">
        <p class="form-hint">导出包含业务表数据。自动备份在服务器 backups 目录，不进 Git。</p>
        <textarea id="backupPreview" readonly placeholder="点击导出 JSON 后显示摘要"></textarea>
      </div>
    </section>
    <section class="kb-panel">
      <div class="panel-head"><h2>恢复导入</h2><span>先预览后执行</span></div>
      <div class="compact-form">
        <div class="file-drop" id="backupDrop">
          <input id="backupFile" type="file" accept="application/json,.json" />
          <div class="file-drop-ui">
            <strong id="backupFileName">点击选择备份 JSON，或拖到这里</strong>
            <span>先预览，再选择导入方式</span>
          </div>
        </div>
        <div class="compact-actions">
          <button class="btn" id="previewImportBtn" type="button">预览</button>
          <button class="btn" id="importSkipBtn" type="button">导入新数据</button>
          <button class="btn danger-btn" id="importReplaceBtn" type="button">覆盖同 ID</button>
        </div>
        <p class="form-hint">导入新数据会跳过已有 ID；覆盖同 ID 会更新相同 ID，不会清空整库。</p>
        <textarea id="importPreview" readonly placeholder="选择备份文件后先预览"></textarea>
      </div>
    </section>
  </main>
  <div id="toast" class="toast"></div>
  <script src="./backup.js"></script>
</body>
</html>
