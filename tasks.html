<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>提醒中心</title>
  <link rel="stylesheet" href="./theme.css" />
  <link rel="stylesheet" href="./knowledge.css" />
</head>
<body class="module knowledge-page task-page compact-tasks">
  <header class="kb-bar">
    <a class="module-back" href="/">返回指挥台</a>
    <div class="module-title"><strong>提醒中心</strong><span>到期推送 · 重复提醒</span></div>
    <button class="btn" id="runDueBtn" type="button">检查到期</button>
  </header>
  <main class="task-shell">
    <section class="kb-panel">
      <div class="panel-head"><h2>新建</h2><span>东八区</span></div>
      <form id="taskForm" class="compact-form">
        <div class="compact-row">
          <input name="title" required placeholder="提醒标题" />
          <select name="recurrence">
            <option value="none">不重复</option>
            <option value="daily">每天</option>
            <option value="weekly">每周</option>
            <option value="monthly">每月</option>
          </select>
        </div>
        <div class="compact-row">
          <input name="remind_at" type="datetime-local" />
          <input name="from_user" placeholder="企微用户ID，可空" />
        </div>
        <textarea name="note" placeholder="备注，可选"></textarea>
        <div class="compact-actions">
          <span class="form-hint">到期后推送到企业微信</span>
          <button class="btn btn-solid" type="submit">创建</button>
        </div>
      </form>
    </section>
    <section class="kb-panel task-list-panel">
      <div class="panel-head">
        <h2>任务</h2>
        <select id="statusFilter">
          <option value="">全部</option>
          <option value="pending">待提醒</option>
          <option value="done">已完成</option>
          <option value="paused">已暂停</option>
        </select>
      </div>
      <div id="taskList" class="log-stream"></div>
    </section>
  </main>
  <div id="toast" class="toast"></div>
  <script src="./tasks.js"></script>
</body>
</html>
