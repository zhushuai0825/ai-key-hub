<!doctype html>
<html lang="zh-CN">
<head><meta charset="utf-8" /><meta name="viewport" content="width=device-width, initial-scale=1" /><title>Task Center · 提醒中心</title><link rel="stylesheet" href="./theme.css" /><link rel="stylesheet" href="./knowledge.css" /></head>
<body class="module knowledge-page task-page">
<header class="kb-bar"><a class="module-back" href="/">返回指挥台</a><div class="module-title"><strong>Task Center</strong><span>提醒任务 · 重复提醒 · 完成状态 · 企微推送</span></div><button class="btn" id="runDueBtn">立即检查到期</button></header>
<main class="task-shell">
<section class="kb-panel"><div class="panel-head"><h2>新建提醒</h2><span>东八区时间</span></div><form id="taskForm" class="doc-form"><input name="from_user" placeholder="企业微信用户ID，可空" /><input name="title" required placeholder="提醒标题" /><textarea name="note" placeholder="备注"></textarea><input name="remind_at" type="datetime-local" /><select name="recurrence"><option value="none">不重复</option><option value="daily">每天</option><option value="weekly">每周</option><option value="monthly">每月</option></select><button class="btn btn-solid" type="submit">创建提醒</button></form></section>
<section class="kb-panel task-list-panel"><div class="panel-head"><h2>任务列表</h2><select id="statusFilter"><option value="">全部</option><option value="pending">待提醒</option><option value="done">已完成</option><option value="paused">已暂停</option></select></div><div id="taskList" class="task-list"></div></section>
</main><div id="toast" class="toast"></div><script src="./tasks.js"></script></body></html>
