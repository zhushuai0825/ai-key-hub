services:
  postgres:
    image: postgres:16-alpine
    container_name: ai-key-hub-postgres
    environment:
      POSTGRES_DB: ai_key_hub
      POSTGRES_USER: ai_admin
      POSTGRES_PASSWORD: ai_admin_123
    ports:
      - "5432:5432"
    volumes:
      - ai_key_hub_pgdata:/var/lib/postgresql/data
    restart: unless-stopped
volumes:
  ai_key_hub_pgdata:
