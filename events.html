<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>系统日志</title>
  <link rel="stylesheet" href="./theme.css" />
  <link rel="stylesheet" href="./knowledge.css" />
</head>
<body class="module knowledge-page log-page">
  <header class="kb-bar">
    <a class="module-back" href="/">返回指挥台</a>
    <div class="module-title">
      <strong>系统日志</strong>
      <span>备份、失败重试、推送等自动任务</span>
    </div>
    <button class="btn" id="refreshBtn" type="button">刷新</button>
  </header>

  <main class="log-shell">
    <section class="kb-panel log-toolbar-panel">
      <form id="filterForm" class="log-filter">
        <select name="level">
          <option value="">全部级别</option>
          <option value="error">错误</option>
          <option value="warn">警告</option>
          <option value="info">信息</option>
        </select>
        <input name="q" placeholder="搜索 backup / retry / push / 文件名" />
        <select name="limit">
          <option value="60">60 条</option>
          <option value="120" selected>120 条</option>
          <option value="200">200 条</option>
        </select>
        <button class="btn btn-solid" type="submit">查询</button>
        <div id="summaryGrid" class="log-stats"></div>
        <span class="log-count" id="eventCount">0 条</span>
      </form>
    </section>

    <section class="kb-panel log-list-panel">
      <div class="panel-head">
        <h2>事件列表</h2>
        <span id="eventUpdated">--</span>
      </div>
      <div id="eventList" class="timeline-list compact">
        <div class="empty-state">正在加载事件...</div>
      </div>
    </section>
  </main>

  <div id="toast" class="toast"></div>
  <script src="./events.js"></script>
</body>
</html>
