<!doctype html><html lang="zh-CN"><head><meta charset="utf-8"/><meta name="viewport" content="width=device-width, initial-scale=1"/><title>系统日志</title><link rel="stylesheet" href="./theme.css"/><link rel="stylesheet" href="./knowledge.css"/></head><body class="module knowledge-page"><header class="kb-bar"><a class="module-back" href="/">返回指挥台</a><div class="module-title"><strong>系统日志</strong><span>备份、失败重试、推送等自动任务记录</span></div><button class="btn" id="refreshBtn">刷新</button></header><main class="config-shell"><section class="kb-panel"><div class="panel-head"><h2>事件筛选</h2><span id="eventUpdated">--</span></div><form id="filterForm" class="doc-form"><div class="form-grid"><label>级别<select name="level"><option value="">全部级别</option><option value="error">error</option><option value="warn">warn</option><option value="info">info</option></select></label><label>关键词<input name="q" placeholder="backup / retry / push / 文件名"/></label><label>数量<input name="limit" type="number" min="20" max="300" value="120"/></label></div><button class="btn" type="submit">查询</button></form></section><section class="kb-panel"><div class="panel-head"><h2>7 天摘要</h2><span id="eventCount">--</span></div><div id="summaryGrid" class="monitor-grid"></div></section><section class="kb-panel"><div class="panel-head"><h2>事件列表</h2><span>按时间倒序</span></div><div id="eventList" class="timeline-list compact"><div class="empty-state">正在加载事件...</div></div></section></main><div id="toast" class="toast"></div><script src="./events.js"></script></body></html>
