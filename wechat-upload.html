<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>上传到知识库</title>
  <link rel="stylesheet" href="./theme.css" />
  <link rel="stylesheet" href="./knowledge.css" />
</head>
<body class="module knowledge-page upload-token-page">
  <main class="upload-token-shell">
    <section class="kb-panel upload-token-panel">
      <div class="panel-head"><h2>上传到知识库</h2><span id="statusText">检查链接中</span></div>
      <form id="uploadTokenForm" class="compact-form">
        <p class="form-hint" id="targetText">正在读取上传目标...</p>
        <div class="upload-progress" aria-label="上传进度"><span id="progressBar"></span></div>
        <div class="upload-steps" id="uploadSteps">
          <span class="active">1 检查</span><span>2 上传</span><span>3 解析</span><span>4 完成</span>
        </div>
        <input name="title" placeholder="文档标题，可空" />
        <div class="file-drop" id="uploadDrop">
          <input name="file" id="uploadFile" type="file" accept=".txt,.md,.pdf,.docx,.json,.csv" required />
          <div class="file-drop-ui">
            <strong id="uploadFileName">点击选择文件，或拖到这里</strong>
            <span>TXT / MD / PDF / DOCX / JSON / CSV</span>
          </div>
        </div>
        <div class="compact-actions">
          <span class="form-hint">上传后自动解析并写入向量库</span>
          <button class="btn btn-solid" type="submit">上传并入库</button>
        </div>
      </form>
      <div id="resultBox" class="empty-state"></div>
    </section>
  </main>
  <script src="./wechat-upload.js"></script>
</body>
</html>
